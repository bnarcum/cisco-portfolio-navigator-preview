<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0f1c"/>
  <title>Cisco AI Canvas · Cloud Control (Demo)</title>
  <link rel="icon" type="image/svg+xml" href="assets/cpn-favicon.svg"/>
  <link rel="stylesheet" href="assets/cpn-cloud-control-briefing.css?v=2.95.0"/>
</head>
<body>
  <!-- ── Cloud Control top nav ─────────────────────────────────────────── -->
  <header class="cc-nav">
    <div class="cc-nav-left">
      <img class="cc-nav-logo" src="assets/cpn-logo.svg" alt="" width="26" height="26" decoding="async"/>
      <span class="cc-nav-product">Cloud Control</span>
      <nav class="cc-nav-tabs">
        <span>Home</span>
        <span>Alerts</span>
        <span class="is-active">AI Canvas</span>
        <span>Topology</span>
        <span>Studio</span>
      </nav>
    </div>
    <div class="cc-nav-right">
      <span class="cc-demo-flag">Demo — not live telemetry</span>
      <div class="cc-presence" id="cc-presence" title="In this session"></div>
      <button class="cc-share" type="button">Share</button>
    </div>
  </header>

  <div class="cc-shell">
    <!-- ── Left: board library + estate ────────────────────────────────── -->
    <aside class="cc-rail cc-rail--left">
      <div class="cc-rail-sec">
        <div class="cc-rail-title">Board Library</div>
        <ul class="cc-boards" id="cc-boards"></ul>
      </div>
      <div class="cc-rail-sec">
        <div class="cc-rail-title">Estate in scope</div>
        <div class="cc-estate-stats">
          <div><span id="cc-inv-items">0</span><small>products</small></div>
          <div><span id="cc-inv-families">0</span><small>families</small></div>
        </div>
        <ul class="cc-estate-list" id="cc-estate-list"></ul>
      </div>
    </aside>

    <!-- ── Center: the generative canvas board ─────────────────────────── -->
    <main class="cc-canvas" id="cc-canvas">
      <div class="cc-board-head">
        <div class="cc-board-titlewrap">
          <span class="cc-board-sev" id="cc-board-sev"></span>
          <div>
            <div class="cc-board-title" id="cc-board-title">—</div>
            <div class="cc-board-crumb">AI Canvas · <span id="cc-account">Account</span> · auto-generated board</div>
          </div>
        </div>
        <div class="cc-board-status" id="cc-board-status">Investigating</div>
      </div>

      <div class="cc-board" id="cc-board"><!-- generated widget cards --></div>
    </main>

    <!-- ── Right: assistant conversation + composer ────────────────────── -->
    <aside class="cc-rail cc-rail--right">
      <div class="cc-assist-head">
        <span class="cc-spark">✦</span> AI Canvas Assistant
      </div>
      <div class="cc-thread" id="cc-thread"><!-- conversation --></div>
      <form class="cc-composer" id="cc-composer" autocomplete="off">
        <button type="button" class="cc-attach" title="Add visual evidence (multimodal)">＋</button>
        <input id="cc-input" type="text" placeholder="Ask AI Canvas anything…" aria-label="Ask AI Canvas"/>
        <button type="submit" class="cc-send" aria-label="Send">➤</button>
      </form>
    </aside>
  </div>

  <button class="cc-back" id="cc-back" type="button">← Back to Portfolio Navigator</button>

  <script src="assets/cpn-cloud-control-ops.js?v=2.95.0"></script>
  <script src="assets/cpn-cloud-control-briefing.js?v=2.95.0"></script>
</body>
</html>

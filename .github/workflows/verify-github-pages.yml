name: Verify GitHub Pages

on:
  workflow_run:
    workflows: [Deploy GitHub Pages]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  verify-live:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read expected version
        id: ver
        run: |
          V=$(grep -oE 'window\.__CPN_BUILD[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' cisco-portfolio-navigator.html | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$V" ]; then
            V=$(grep -oE 'const APP_VERSION[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' cisco-portfolio-navigator.html | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi
          if [ -z "$V" ]; then echo "Could not read APP_VERSION / __CPN_BUILD" >&2; exit 1; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Expecting v$V on production Pages"

      - name: Wait for production Pages
        run: node scripts/wait-for-github-pages.mjs --targets production --version "${{ steps.ver.outputs.version }}" --timeout 480
